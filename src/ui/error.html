<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error - Disposable Form</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .error-code {
      font-size: 48px;
      font-weight: bold;
      margin: 0 0 8px;
      color: #e53935;
    }
    .error-message {
      font-size: 18px;
      color: #333;
      margin: 0 0 16px;
    }
    .error-description {
      font-size: 14px;
      color: #666;
      margin: 0;
    }
    .landing-link {
      display: inline-block;
      margin-top: 16px;
      color: #1976d2;
      text-decoration: none;
    }
    .landing-link:hover {
      text-decoration: underline;
    }
    .support-container {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }
    .support-link {
      display: inline-block;
      padding: 10px 16px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      color: #333;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s, border-color 0.2s;
    }
    .support-link:hover {
      background: #e8e8e8;
      border-color: #ccc;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- injected-script -->
  <script src="/ui/error.js"></script>
</body>
</html>
