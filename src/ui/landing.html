<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disposable Form</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .landing-container {
      background: white;
      padding: 48px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      color: #1a1a2e;
    }
    .subtitle {
      color: #666;
      margin: 0 0 32px;
    }
    .description {
      color: #555;
      font-size: 14px;
      margin: 0 0 24px;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #1976d2;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px 24px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #1565c0;
    }
    .error-text {
      color: #e53935;
      font-size: 14px;
      margin-top: 8px;
    }
    .support-container {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }
    .support-link {
      display: inline-block;
      padding: 10px 16px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      color: #333;
      text-decoration: none;
      font-size: 14px;
      transition: background 0.2s, border-color 0.2s;
    }
    .support-link:hover {
      background: #e8e8e8;
      border-color: #ccc;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/ui/landing.js"></script>
</body>
</html>
