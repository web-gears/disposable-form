<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disposable Form</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Droid Sans Mono', 'Source Code Pro', monospace;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1.6;
    }
    .landing-container {
      background: #161b22;
      border: 1px solid #30363d;
      padding: 40px;
      border-radius: 6px;
      max-width: 420px;
      width: 100%;
    }
    h1 {
      font-size: 18px;
      font-weight: 400;
      margin: 0 0 8px;
      color: #58a6ff;
    }
    h1::before {
      content: '~/tools/$ ';
      color: #8b949e;
    }
    .subtitle {
      color: #8b949e;
      margin: 0 0 24px;
      font-size: 13px;
    }
    .description {
      color: #8b949e;
      font-size: 13px;
      margin: 0 0 24px;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #c9d1d9;
      font-size: 12px;
    }
    .form-group label::before {
      content: '// ';
      color: #6e7681;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #58a6ff;
    }
    input[type="text"]::placeholder {
      color: #6e7681;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px 20px;
      background: #238636;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #2ea043;
    }
    .error-text {
      color: #f85149;
      font-size: 12px;
      margin-top: 8px;
    }
    .error-text::before {
      content: 'error: ';
    }
    .support-container {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #30363d;
    }
    .support-link {
      display: inline-block;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      text-decoration: none;
      font-size: 12px;
      transition: all 0.2s;
    }
    .support-link:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }
    .branding {
      margin-top: 24px;
      font-size: 11px;
      color: #6e7681;
    }
    .branding a {
      color: #58a6ff;
      text-decoration: none;
    }
    .branding a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="/ui/landing.js"></script>
</body>
</html>
