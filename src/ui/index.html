<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disposable Form</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .form-container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee;
    }
    h1 { margin: 0; font-size: 24px; color: #333; }
    .timeout { color: #666; font-size: 14px; }
    .field-group { margin-bottom: 20px; }
    .field-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #333;
    }
    .required { color: #e53935; margin-left: 4px; }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    input[type="date"],
    input[type="datetime-local"],
    input[type="range"],
    textarea, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      background: white;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #1976d2;
    }
    .field-group.has-error input,
    .field-group.has-error textarea,
    .field-group.has-error select {
      border-color: #e53935;
    }
    .error-msg { color: #e53935; font-size: 12px; margin-top: 4px; display: block; }
    .checkbox-label, .switch-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .checkbox-label input, .switch-label input { width: auto; }
    .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .radio-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    button[type="submit"] {
      width: 100%;
      padding: 12px 24px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover:not(:disabled) { background: #1565c0; }
    button[type="submit"]:disabled { background: #90caf9; cursor: not-allowed; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .success-container {
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      background: #4caf50;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 16px;
    }
    .success-container h2 { margin: 0 0 8px; color: #333; }
    .success-container p { color: #666; margin: 0; }
    .timeout-note {
      margin-top: 16px;
      font-size: 14px;
      color: #999;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- injected-config -->
  <script src="/ui/bundle.js"></script>
</body>
</html>
