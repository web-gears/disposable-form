<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/ui/favicon.svg">
  <title>Disposable Form</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', 'Droid Sans Mono', 'Source Code Pro', monospace;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }
    .form-container {
      max-width: 560px;
      margin: 0 auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 32px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid #30363d;
    }
    header::before {
      content: '// session: ';
      color: #6e7681;
      font-size: 12px;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 400;
      color: #58a6ff;
    }
    .timeout {
      color: #8b949e;
      font-size: 12px;
    }
    .timeout::before {
      content: 'expires in ';
    }
    .timeout::after {
      content: 's';
    }
    .field-group {
      margin-bottom: 24px;
    }
    .field-group label {
      display: block;
      margin-bottom: 8px;
      color: #c9d1d9;
      font-size: 13px;
    }
    .required {
      color: #f85149;
      margin-left: 4px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    input[type="date"],
    input[type="datetime-local"],
    input[type="range"],
    textarea, select {
      width: 100%;
      padding: 12px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #58a6ff;
    }
    input::placeholder, textarea::placeholder {
      color: #6e7681;
    }
    .field-group.has-error input,
    .field-group.has-error textarea,
    .field-group.has-error select {
      border-color: #f85149;
    }
    .error-msg {
      color: #f85149;
      font-size: 12px;
      margin-top: 6px;
      display: block;
    }
    .error-msg::before {
      content: '// ';
      color: #6e7681;
    }
    .checkbox-label, .switch-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      margin-bottom: 16px;
    }
    .checkbox-label input, .switch-label input { width: auto; }
    .radio-group { display: flex; flex-direction: column; gap: 12px; }
    .radio-group label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    button[type="submit"] {
      width: 100%;
      padding: 14px 24px;
      background: #238636;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover:not(:disabled) { background: #2ea043; }
    button[type="submit"]:disabled {
      background: #21262d;
      color: #6e7681;
      cursor: not-allowed;
    }
    .loading {
      text-align: center;
      padding: 60px 40px;
      color: #8b949e;
    }
    .loading::before {
      content: '// loading form...';
    }
    .success-container {
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
      padding: 48px 40px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .success-icon {
      width: 56px;
      height: 56px;
      background: #238636;
      color: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 20px;
    }
    .success-container h2 {
      margin: 0 0 12px;
      color: #3fb950;
      font-size: 18px;
      font-weight: 400;
    }
    .success-container p {
      color: #8b949e;
      margin: 0 0 8px;
      font-size: 14px;
    }
    .timeout-note {
      margin-top: 20px;
      font-size: 12px;
      color: #6e7681;
    }
    .timeout-note::before {
      content: '// ';
    }
    .support-container {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #30363d;
      text-align: center;
    }
    .support-link {
      display: inline-block;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      text-decoration: none;
      font-size: 12px;
      transition: all 0.2s;
    }
    .support-link:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- injected-config -->
  <script src="/ui/bundle.js"></script>
</body>
</html>
